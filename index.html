<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="hsl(210, 20%, 98%)" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="hsl(222, 30%, 7%)" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="יומן חנ״ג חכם" />
    <title>יומן חנ״ג חכם</title>
    <meta name="description" content="יומן המורה הדיגיטלי לחינוך גופני" />
    <script>
      /* TEMP boot diagnostics — remove after debugging */
      (function () {
        function show(msg) {
          var el = document.getElementById('boot-error');
          if (!el) {
            el = document.createElement('div');
            el.id = 'boot-error';
            el.style.cssText = 'position:fixed;top:0;left:0;right:0;max-height:60vh;overflow:auto;background:#fff0f0;color:#900;font:11px/1.5 monospace;padding:10px;z-index:99999;white-space:pre-wrap;direction:ltr;text-align:left;border-bottom:2px solid #900';
            document.body.appendChild(el);
          }
          el.textContent += msg + '\n---\n';
        }
        window.addEventListener('error', function (e) {
          var t = e.target || {};
          show('[error] ' + (e.message || '') + ' @ ' + (e.filename || '') + ':' + (e.lineno || '') + ' | tag=' + (t.tagName || '') + ' src=' + (t.src || t.href || ''));
        }, true);
        setTimeout(async function () {
          try {
            var seen = new Set();
            var queue = ['/src/main.jsx'];
            var count = 0;
            while (queue.length && count < 500) {
              var url = queue.shift();
              if (seen.has(url)) continue;
              seen.add(url);
              count++;
              var res;
              try { res = await fetch(url); } catch (err) { show('[NETWORK FAIL] ' + url + ' — ' + err.message); continue; }
              var body = await res.text();
              if (!res.ok) {
                show('[BROKEN MODULE] ' + url + ' status=' + res.status + '\n' + body.slice(0, 2000));
                continue;
              }
              var re = /(?:from|^import)\s+"([^"]+)"/gm;
              var m;
              while ((m = re.exec(body))) {
                var s = m[1];
                if (s.startsWith('/') && !seen.has(s)) queue.push(s);
              }
            }
            show('[probe done] scanned=' + count);
          } catch (err) { show('[probe error] ' + err.message); }
        }, 2500);
        window.addEventListener('unhandledrejection', function (e) {
          var r = e.reason || {};
          show('[rejection] ' + (r.message || String(r)) + '\n' + (r.stack || ''));
        });
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:hsl(210,20%,98%)">
        <img src="https://media.base44.com/images/public/6a1d68f94dec55d128da882f/854e67890_5CF5E9B9-1E5C-4BD2-885F-9E5B2D0AF927.png" alt="" style="width:80px;height:80px;border-radius:26px;animation:boot-pulse 1.2s ease-in-out infinite" />
        <style>
          @keyframes boot-pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.6; transform:scale(.94); } }
          @media (prefers-color-scheme: dark) { #root > div { background:hsl(222,30%,7%) !important; } }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
