<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=()" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://media.base44.com https://base44.com https://*.base44.com; connect-src 'self' https://base44.com https://*.base44.com https://base44.app https://*.base44.app wss://base44.com wss://*.base44.com wss://base44.app wss://*.base44.app; worker-src 'self' blob:; media-src 'self' blob:; manifest-src 'self'"
    />
    <meta name="theme-color" content="#fafdff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="יומן חנ״ג חכם" />
    <title>יומן חנ״ג חכם</title>
    <meta name="description" content="יומן המורה הדיגיטלי לחינוך גופני" />
    <script>
      (() => {
        const saved = localStorage.getItem('theme');
        const dark = saved === 'dark' || ((!saved || saved === 'system') && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('dark', dark);
        document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:hsl(210,20%,98%)">
        <img src="https://media.base44.com/images/public/6a1d68f94dec55d128da882f/854e67890_5CF5E9B9-1E5C-4BD2-885F-9E5B2D0AF927.png" alt="" style="width:80px;height:80px;border-radius:26px;animation:boot-pulse 1.2s ease-in-out infinite" />
        <style>
          @keyframes boot-pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.6; transform:scale(.94); } }
          @media (prefers-color-scheme: dark) { #root > div { background:hsl(222,30%,7%) !important; } }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
